<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Customer Support AI Agent architecture diagram">
  <rect width="1280" height="720" fill="#f3f6fa"/>
  <text x="70" y="72" fill="#142238" font-family="Arial, sans-serif" font-size="34" font-weight="700">Customer Support AI Agent Architecture</text>
  <text x="72" y="108" fill="#526176" font-family="Arial, sans-serif" font-size="16">Default deterministic mode is testable without secrets. Hosted LLM mode is optional behind environment variables.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2b6fcf"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d2a3e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="230" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="96" y="214" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">React Console</text>
    <text x="96" y="246" fill="#526176" font-family="Arial, sans-serif" font-size="15">TypeScript CRM UI</text>
    <text x="96" y="272" fill="#526176" font-family="Arial, sans-serif" font-size="15">Tool traces and safety state</text>

    <rect x="390" y="170" width="230" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="416" y="214" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">FastAPI</text>
    <text x="416" y="246" fill="#526176" font-family="Arial, sans-serif" font-size="15">/graphql endpoint</text>
    <text x="416" y="272" fill="#526176" font-family="Arial, sans-serif" font-size="15">CORS and schema boundary</text>

    <rect x="710" y="170" width="230" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="736" y="214" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">Agent Orchestrator</text>
    <text x="736" y="246" fill="#526176" font-family="Arial, sans-serif" font-size="15">Deterministic default</text>
    <text x="736" y="272" fill="#526176" font-family="Arial, sans-serif" font-size="15">Optional hosted LLM mode</text>

    <rect x="1030" y="170" width="190" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="1056" y="214" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">Guardrails</text>
    <text x="1056" y="246" fill="#526176" font-family="Arial, sans-serif" font-size="15">Sensitive data</text>
    <text x="1056" y="272" fill="#526176" font-family="Arial, sans-serif" font-size="15">Human approval</text>

    <rect x="390" y="430" width="230" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="416" y="474" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">CRM Tools</text>
    <text x="416" y="506" fill="#526176" font-family="Arial, sans-serif" font-size="15">lookup_customer</text>
    <text x="416" y="532" fill="#526176" font-family="Arial, sans-serif" font-size="15">create/update/summarize</text>

    <rect x="710" y="430" width="230" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="736" y="474" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">CRM Data</text>
    <text x="736" y="506" fill="#526176" font-family="Arial, sans-serif" font-size="15">Mock records by default</text>
    <text x="736" y="532" fill="#526176" font-family="Arial, sans-serif" font-size="15">Optional SQLite snapshot</text>

    <rect x="1030" y="430" width="190" height="132" rx="10" fill="#ffffff" stroke="#cad7e6"/>
    <text x="1056" y="474" fill="#152238" font-family="Arial, sans-serif" font-size="20" font-weight="700">Evaluations</text>
    <text x="1056" y="506" fill="#526176" font-family="Arial, sans-serif" font-size="15">Tool-use tests</text>
    <text x="1056" y="532" fill="#526176" font-family="Arial, sans-serif" font-size="15">Safety regressions</text>
  </g>

  <path d="M300 236 H382" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 236 H702" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M940 236 H1022" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M825 302 V422" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M710 496 H628" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M940 496 H1022" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M505 430 V315 H710" fill="none" stroke="#2b6fcf" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
